<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI City Builder | 2026 全球政經旗艦版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #00d2ff;
            --gold: #ffcc00;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --night-bg: #020617;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #87ceeb;
            font-family: 'Outfit', sans-serif; transition: background 2s;
        }

        /* 📱 手機自適應容器 */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 🏰 頂部 HUD (市長與金庫) */
        #hud-top {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
        }
        .header-box {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-radius: 40px; padding: 10px 25px; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid white;
            display: flex; align-items: center; gap: 15px; color: #1e293b;
        }

        /* 📊 右側「團隊戰況回報」自適應小窗 */
        #squad-panel {
            position: absolute; right: 20px; top: 100px; width: 220px;
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); pointer-events: auto;
            z-index: 100; border: 1px solid rgba(255,255,255,0.5);
        }
        .squad-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; font-size: 13px; }
        .squad-status { color: #64748b; font-size: 11px; }

        /* 📡 底部 TradingView 情報流 */
        #news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95); color: white; padding: 12px 0;
            z-index: 200; pointer-events: auto; border-top: 3px solid var(--primary);
        }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker 40s linear infinite; font-weight: 700; font-size: 14px; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 🏡 建築標籤 */
        .poi-label {
            position: absolute; background: white; border: 2.5px solid var(--primary);
            color: #0f172a; padding: 6px 15px; border-radius: 12px;
            font-size: 13px; font-weight: 900; cursor: pointer; pointer-events: auto;
            transform: translate(-50%, -100%); transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); z-index: 50;
        }

        /* 彈窗 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5000;
            pointer-events: auto; backdrop-filter: blur(10px);
        }
        #modal-box { background: white; width: 90%; max-width: 450px; border-radius: 35px; padding: 35px; }

        /* 📱 手機優化：當寬度小於 768px */
        @media (max-width: 768px) {
            #squad-panel { display: none; } /* 手機端隱藏戰況窗以節省空間 */
            .header-box { padding: 8px 15px; font-size: 12px; }
            .header-box div div:last-child { font-size: 12px !important; }
            #news-ticker { padding: 8px 0; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>

    <div id="hud-top">
        <div class="header-box">
            <div style="font-size: 24px;">🤵</div>
            <div>
                <div style="font-size: 9px; font-weight: 800; color: #64748b;">TPE TIME: <span id="clock">--:--</span></div>
                <div id="status-msg" style="font-size: 14px; font-weight: 900;">市長，城鎮同步中</div>
            </div>
        </div>
        <div class="header-box" style="border-right: 4px solid var(--gold);">
            <div style="text-align: right;">
                <div style="font-size: 9px; font-weight: 800; color: #64748b;">TOTAL REVENUE</div>
                <div style="font-size: 18px; font-weight: 900; color: #059669;" id="total-pnl">$0.00 U</div>
            </div>
            <div style="font-size: 24px;">💰</div>
        </div>
    </div>

    <!-- 右側戰況總覽 -->
    <div id="squad-panel">
        <div style="font-size: 11px; font-weight: 900; color: #94a3b8; margin-bottom: 20px; letter-spacing: 1px;">SQUAD STATUS</div>
        <div id="squad-list">
            <!-- 動態填充 -->
        </div>
    </div>

    <div id="news-ticker">
        <div class="ticker-wrap">
            <div class="ticker" id="global-ticker">
                [LIVE INTEL] 正在連線 TRADINGVIEW 財經串流... 聯準會預測數據更新中... 地緣政治風險回報預警...
            </div>
        </div>
    </div>

    <div id="labels-container"></div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="m-title" style="margin:0; font-weight:900;">數據回報</h2>
            <div id="m-body"></div>
            <button onclick="closeModal()" style="width:100%; margin-top:25px; padding:15px; border-radius:20px; border:none; background:var(--primary); color:white; font-weight:900;">回到指揮中心</button>
        </div>
    </div>

    <script>
        // --- 1. Three.js & 環境系統 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 300);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(80, 80, 100);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);

        // 地形
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x55aa55 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        // 建築物列表 (新增 XAUT)
        const buildings = [
            { id: 'BTC', name: 'BTC 摩天站', color: 0x3b82f6, h: 35, x: -30, z: -30 },
            { id: 'ETH', name: 'ETH 工事台', color: 0x8b5cf6, h: 25, x: 20, z: -25 },
            { id: 'SOL', name: 'SOL 觀察台', color: 0x10b981, h: 20, x: -30, z: 30 },
            { id: 'PEPE', name: '🐸 PEPE 基地', color: 0x22c55e, h: 12, x: 30, z: 30 },
            { id: 'XAUT', name: '🌕 黃金聖殿', color: 0xfacc15, h: 28, x: 0, z: -45 }, // 新增黃金
            { id: 'TREASURY', name: '中央金庫', color: 0xf59e0b, h: 25, x: 0, z: 0 },
            { id: 'NEWS', name: '情報中心', color: 0x64748b, h: 18, x: 0, z: 40 }
        ];

        const labelContainer = document.getElementById('labels-container');
        buildings.forEach(b => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(8, b.h, 8), new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.1, metalness: 0.5 }));
            m.position.set(b.x, b.h/2, b.z); m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
            b.mesh = m;

            const div = document.createElement('div');
            div.className = 'poi-label';
            div.innerText = b.name;
            div.onclick = () => {
                if(b.id === 'TREASURY') showTreasury();
                else showAgent(b.id);
            };
            labelContainer.appendChild(div);
            b.label = div;
        });

        // 精靈系統
        const sprites = [];
        const sGeo = new THREE.SphereGeometry(1.2, 8, 8);
        const sMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });
        for(let i=0; i<8; i++) {
            const s = new THREE.Mesh(sGeo, sMat); s.position.set(0, 5, 0);
            scene.add(s);
            sprites.push({ mesh: s, target: {x:0, z:0} });
        }

        // --- 2. 即時更新系統 ---
        function updateTownData() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = `$${data.total_pnl.toFixed(2)} U`;
                document.getElementById('clock').innerText = data.tpe_time;
                document.getElementById('global-ticker').innerText = `[TRADINGVIEW] ${data.macro_report} | 聯準會觀察: ${data.macro_report} | 台北時間: ${data.tpe_time}`;
                
                // 日夜切換
                if(data.is_night) {
                    scene.background.setHex(0x020617);
                    scene.fog.color.setHex(0x020617);
                    sun.intensity = 0.2;
                    ambient.intensity = 0.2;
                } else {
                    scene.background.setHex(0x87ceeb);
                    scene.fog.color.setHex(0x87ceeb);
                    sun.intensity = 1.0;
                    ambient.intensity = 0.6;
                }

                // 右側戰況
                let squadHtml = '';
                const activeSet = new Set(data.positions.map(p => p.symbol));
                ['BTC','ETH','SOL','PEPE','XAUT'].forEach(s => {
                    const status = activeSet.has(s) ? '<span style="color:#059669">任務中</span>' : '<span style="color:#94a3b8">休息中</span>';
                    squadHtml += `<div class="squad-item"><div>${s} 師團</div><div class="squad-status">${status}</div></div>`;
                    
                    // 建築物發光
                    const b = buildings.find(x => x.id === s);
                    if(b) b.mesh.material.emissive.setHex(activeSet.has(s) ? 0x00ff00 : 0x000000);
                });
                document.getElementById('squad-list').innerHTML = squadHtml;
            });
        }
        setInterval(updateTownData, 5000); updateTownData();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const tempV = new THREE.Vector3();
            buildings.forEach(b => {
                tempV.set(b.x, b.h + 2, b.z).project(camera);
                if(tempV.z < 1) {
                    b.label.style.display = 'block';
                    b.label.style.left = `${(tempV.x * 0.5 + 0.5) * window.innerWidth}px`;
                    b.label.style.top = `${(tempV.y * -0.5 + 0.5) * window.innerHeight}px`;
                } else b.label.style.display = 'none';
            });
            // 精靈走動
            sprites.forEach(s => {
                if(Math.random() > 0.98) s.target = buildings[Math.floor(Math.random()*buildings.length)];
                s.mesh.position.x += (s.target.x - s.mesh.position.x) * 0.01;
                s.mesh.position.z += (s.target.z - s.mesh.position.z) * 0.01;
                s.mesh.position.y = 3 + Math.sin(Date.now() * 0.005) * 2;
            });
            renderer.render(scene, camera);
        }
        animate();

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function showAgent(id) {
            fetch(`/api/agent/${id}`).then(r => r.json()).then(data => {
                document.getElementById('m-title').innerText = `🏢 ${id} 師團指令中心`;
                document.getElementById('m-body').innerHTML = `<div style="background:#f8fafc; padding:20px; border-radius:20px; border-left:5px solid var(--primary); margin-top:15px;"><h3>組長戰略</h3><p>"${data.decision}"</p></div>`;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }
        function showTreasury() {
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('m-title').innerText = `💰 小鎮中央金庫`;
                document.getElementById('m-body').innerHTML = `<div style="text-align:center; padding:30px;"><h3>累計營收</h3><p style="font-size:2.5rem; font-weight:900; color:#059669;">$${data.stats.all_time.toFixed(2)} U</p></div>`;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
