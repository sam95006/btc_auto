<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading SimCity | 自主交易領地</title>
    <style>
        :root {
            --tile-bg: #2d5a27;
            --road-bg: #555;
            --neon: #00ffcc;
            --gold: #ffcc00;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #080808; overflow: hidden; font-family: 'Consolas', monospace; }

        /* 🌍 斜 45 度世界容器 */
        #world-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: auto; perspective: 1000px;
            background: radial-gradient(circle at 50% 50%, #1a2a1a 0%, #000 100%);
        }

        #town-grid {
            position: relative; width: 1000px; height: 1000px;
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            background: var(--tile-bg);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border: 15px solid #222;
        }

        /* 🛤️ 模擬城市路徑 */
        .grid-line { position: absolute; background: rgba(255,255,255,0.05); }
        .h-line { width: 100%; height: 1px; }
        .v-line { height: 100%; width: 1px; }

        .major-road { position: absolute; background: #333; box-shadow: inset 0 0 20px black; }
        .road-v { left: 45%; width: 10%; height: 100%; }
        .road-h { top: 45%; height: 10%; width: 100%; }

        /* 🏠 模擬城市建築渲染 (SVG) */
        .sim-building {
            position: absolute; cursor: pointer; transform-style: preserve-3d;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }
        .sim-building:hover { transform: scale(1.1) translateZ(30px); filter: drop-shadow(0 0 20px var(--neon)); }

        .svg-container { width: 120px; height: 120px; transform: rotateZ(45deg) rotateX(-60deg); }
        
        .floating-label {
            position: absolute; top: -30px; background: rgba(0,0,0,0.85); color: #fff;
            padding: 4px 12px; border: 2px solid var(--neon); border-radius: 5px;
            font-size: 14px; font-weight: bold; transform: rotateZ(45deg) rotateX(-60deg);
            white-space: nowrap; pointer-events: none; z-index: 100;
        }

        /* 🧙 AI 特工精靈 */
        .agent-pawn {
            position: absolute; width: 30px; height: 30px;
            z-index: 500; transform-style: preserve-3d;
            transition: all 4s linear;
        }
        .agent-pawn .pawn-svg { transform: rotateZ(45deg) rotateX(-60deg) translateZ(10px); }

        /* 📊 HUD 面板 */
        #hud-top {
            position: fixed; top: 20px; left: 20px; right: 20px; 
            display: flex; justify-content: space-between; pointer-events: none; z-index: 2000;
        }
        .hud-panel {
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon); padding: 15px; 
            border-radius: 10px; color: var(--neon); pointer-events: all;
            box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 5000;
        }
        #modal-box {
            background: #111; border: 4px solid var(--neon); width: 600px; padding: 30px; border-radius: 20px; color: white;
            box-shadow: 0 0 100px var(--neon);
        }
        .stat-card { background: #222; border-left: 5px solid var(--neon); padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="hud-top">
        <div class="hud-panel">
            <h2 style="margin:0; font-size: 1.2rem;">🏙️ SimCity HQ</h2>
            <div id="status-line">小鎮運作中：24H 生產值穩定</div>
            <div style="color:var(--gold)">💰 生涯結算: <span id="total-pnl">0.00</span> U</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div>🌡️ 全球市場情緒: <span id="global-bias">0.50</span></div>
            <div id="weather-text">☁️ 天氣: 模擬環境穩定</div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="modal-title" style="color:var(--neon); border-bottom: 2px solid #333; padding-bottom: 10px;">數據通訊</h2>
            <div id="modal-body"></div>
            <button onclick="closeModal()" style="width:100%; background:var(--neon); color:#000; border:none; padding:12px; font-weight:bold; cursor:pointer; margin-top:20px;">返回市長辦公室</button>
        </div>
    </div>

    <div id="world-container">
        <div id="town-grid">
            <!-- 格線系統 -->
            <div class="grid-layer" id="grid-lines"></div>
            
            <div class="major-road road-v"></div>
            <div class="major-road road-h"></div>

            <!-- BTC 總部 (SVG 繪製模擬城市風格房子) -->
            <div id="btc-hq" class="sim-building" style="top:25%; left:25%" onclick="showAgent('BTC')">
                <div class="floating-label">🪙 BTC 數據司令部</div>
                <div class="svg-container">
                    <svg viewBox="0 0 100 100">
                        <path d="M10 50 L50 20 L90 50 L90 90 L10 90 Z" fill="#d35400" stroke="#111" stroke-width="2"/>
                        <path d="M50 20 L90 50 L50 80 L10 50 Z" fill="#e67e22" stroke="#111" stroke-width="2"/>
                        <rect x="40" y="60" width="20" height="30" fill="#333" />
                        <circle cx="50" cy="40" r="8" fill="gold" />
                    </svg>
                </div>
            </div>

            <!-- ETH 工廠 -->
            <div id="eth-hq" class="sim-building" style="top:25%; right:25%" onclick="showAgent('ETH')">
                <div class="floating-label">🔹 ETH 自主工坊</div>
                <div class="svg-container">
                    <svg viewBox="0 0 100 100">
                      <rect x="20" y="40" width="60" height="50" fill="#2980b9" stroke="#111" />
                      <polygon points="20,40 50,10 80,40" fill="#3498db" stroke="#111" />
                      <rect x="60" y="20" width="10" height="30" fill="#555" />
                    </svg>
                </div>
            </div>

            <!-- Treasury Tower -->
            <div id="treasury-tower" class="sim-building" style="top:50%; left:50%; transform:translate(-50%, -50%)" onclick="showTreasury()">
                <div class="floating-label" style="border-color:var(--gold); color:var(--gold);">🏛️ 模擬金總財務部</div>
                <div class="svg-container" style="width:150px; height:150px;">
                    <svg viewBox="0 0 100 150">
                        <rect x="25" y="80" width="50" height="60" fill="#444" stroke="gold" stroke-width="2" />
                        <rect x="35" y="40" width="30" height="40" fill="#222" stroke="gold" />
                        <polygon points="50,5 20,40 80,40" fill="gold" />
                    </svg>
                </div>
            </div>

            <!-- 森林裝飾 -->
            <div class="sim-building" style="bottom:10%; right:10%">
                <div class="svg-container" style="width:60px; height:60px;">
                    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#1b5e20"/></svg>
                </div>
            </div>

            <!-- 🧙 AI 小博士跑馬燈 -->
            <div id="pawn-BTC" class="agent-pawn">
                <div class="pawn-svg"><svg width="30" height="30"><circle cx="15" cy="15" r="10" fill="#00ffff"/><text x="10" y="20" font-size="12">🧠</text></svg></div>
            </div>
            <div id="pawn-ETH" class="agent-pawn">
                <div class="pawn-svg"><svg width="30" height="30"><circle cx="15" cy="15" r="10" fill="#00ff00"/><text x="10" y="20" font-size="12">📉</text></svg></div>
            </div>
        </div>
    </div>

    <script>
        // 初始化格線
        const gridLayer = document.getElementById('grid-lines');
        for(let i=0; i<=20; i++) {
            const h = document.createElement('div'); h.className = 'grid-line h-line'; h.style.top = (i*5) + '%';
            const v = document.createElement('div'); v.className = 'grid-line v-line'; v.style.left = (i*5) + '%';
            gridLayer.appendChild(h); gridLayer.appendChild(v);
        }

        function update() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = data.total_pnl.toFixed(2);
                document.getElementById('global-bias').innerText = data.global_bias.toFixed(2);
                document.getElementById('news-ticker').innerText = "📰 最新情報: " + data.macro_report;
            });
        }
        setInterval(update, 5000); update();

        function showAgent(name) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `🏢 戰略司令部: ${name}`;
            fetch(`/api/agent/${name}`).then(r => r.json()).then(data => {
                body.innerHTML = `
                    <div class="stat-card"><h3>🎖️ 特工聲望</h3><p>Lv. ${Math.floor(Math.random()*20)} - 菁英特工</p></div>
                    <div class="stat-card"><h3>🧠 組長最近思考</h3><p>${data.decision}</p></div>
                    <div class="stat-card"><h3>💰 累計產值</h3><p>${data.summary.total_pnl} U</p></div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function showTreasury() {
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('modal-title').innerText = `🏛️ 總金庫數據核算`;
                document.getElementById('modal-body').innerHTML = `
                    <div class="stat-card"><h3>全村資產淨值</h3><p style="font-size:1.8rem; color:var(--gold);">${data.stats.all_time.toFixed(2)} U</p></div>
                    <div class="stat-card"><h3>7日生產力報表</h3><p>${data.stats.week.toFixed(2)} U</p></div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // 模擬城市 AI 巡邏
        function wander() {
            const pawns = ['pawn-BTC', 'pawn-ETH'];
            pawns.forEach(id => {
                const el = document.getElementById(id);
                if(Math.random() > 0.5) {
                    el.style.top = (20 + Math.random()*60) + '%';
                    el.style.left = (20 + Math.random()*60) + '%';
                }
            });
        }
        setInterval(wander, 8000);
    </script>
</body>
</html>
