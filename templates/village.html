<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolis v6.0 | Elite Battle Royale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --primary: #0ea5e9; --gold: #fde047; --ok: #10b981; --err: #ef4444; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background: #020617; }
        
        #hud-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel-box { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-radius: 20px; padding: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; color: white; }
        
        #left-stack { position: absolute; top: 25px; left: 25px; display: flex; flex-direction: column; gap: 15px; }
        #right-stack { position: absolute; top: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        #bottom-stack { position: absolute; bottom: 55px; right: 25px; }

        .meeting-pill { font-size: 10px; padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.1); color: #94a3b8; font-weight: 800; }
        .pill-done { background: var(--ok); color: white; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 150; }
        #modal-box { background: white; border-radius: 30px; padding: 30px; width: 520px; box-shadow: 0 40px 100px rgba(0,0,0,1); color: #1e293b; }
        
        .price-label { position: absolute; background: rgba(15, 23, 42, 0.95); color: white; padding: 6px 14px; border-radius: 10px; font-size: 14px; font-weight: 900; pointer-events: none; border-left: 5px solid var(--primary); white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .alarm-red { animation: flash-red 1.5s infinite; }
        @keyframes flash-red { 0% { background: #020617; } 50% { background: #450a0a; } 100% { background: #020617; } }

        .light-ok { background-color: var(--ok) !important; box-shadow: 0 0 10px var(--ok) !important; }
        .light-err { background-color: var(--err) !important; box-shadow: 0 0 10px var(--err) !important; }

        #news-ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; color: #0f172a; padding: 8px 0; border-top: 4px solid var(--primary); z-index: 20; }
        .ticker-wrap { overflow: hidden; white-space: nowrap; pointer-events: auto; }
        .ticker { display: inline-block; animation: scroll 40s linear infinite; font-weight: 900; font-size: 14px; }
        @keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        .market-index { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; font-weight:900;}
    </style>
</head>
<body id="main-body">
    <div id="webgl-canvas-container" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1;"></div>
    <div id="label-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 5;"></div>

    <div id="hud-container">
        <div id="left-stack">
            <div id="command-center" class="panel-box" style="width: 330px;">
                <div style="font-size: 11px; font-weight:900; color:#94a3b8; letter-spacing:2px; margin-bottom:12px;">SUPREME COMMAND v6.0</div>
                <div id="alarm-banner" style="display:none; background:var(--err); color:white; padding:10px; border-radius:10px; font-weight:900; text-align:center; font-size:12px; margin-bottom:15px;">🏮 全城進入紅色警戒！</div>
                
                <div class="market-index"><span>🇹🇼 台股大盤</span><div id="taiex-status" style="font-size:11px; color:var(--primary);">--</div></div>
                <div class="market-index" style="border:none;"><span>🇺🇸 標普 500</span><div id="sp500-status" style="font-size:11px; color:var(--gold);">--</div></div>

                <div style="margin-top:10px; background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; border:1px dashed rgba(255,255,255,0.2);">
                    <div style="font-size:10px; color:#94a3b8; margin-bottom:5px;">📰 今日戰果日報</div>
                    <div id="daily-debrief" style="font-size:13px; font-weight:800; color:var(--gold); line-height:1.5;">正在由 AI 生成日報...</div>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900; color:#cbd5e1; margin-top:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
                    <span>台北: <span id="clock-tpe">--:--</span></span>
                    <span>紐約: <span id="clock-ny">--:--</span></span>
                </div>
            </div>

            <div id="round-table" class="panel-box" style="width: 330px; border-left: 8px solid var(--gold);">
                <div style="font-size:11px; font-weight:900; color:var(--gold); margin-bottom:12px;">🏛️ 圓桌決策共識</div>
                <div id="mt-list" style="display:flex; gap:6px; margin-bottom:12px;"></div>
                <div id="rt-log" style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; font-size:13px; color:#fde047; line-height:1.6; font-weight:700;">同步資訊中...</div>
            </div>
        </div>

        <div id="right-stack">
            <div id="revenue-center" class="panel-box" style="width: 260px; text-align:right;">
                <div style="font-size:11px; font-weight:900; color:#94a3b8;">指揮部總收益</div>
                <div id="rev-all" style="font-size:35px; font-weight:900; color:var(--gold);">+0.0 U</div>
                <div style="font-size:16px; font-weight:800; color:var(--ok);">今日盈虧: <span id="rev-today">+0.0</span></div>
            </div>
        </div>

        <div id="bottom-stack" class="panel-box" style="width: 280px;">
            <div style="font-size:11px; font-weight:900; margin-bottom:10px; color:#94a3b8;">特工能量監控</div>
            <div id="agent-list"></div>
        </div>
    </div>

    <div id="news-ticker"><div class="ticker-wrap"><div class="ticker" id="global-ticker">📡 全球金融傳感器對接中... 📡</div></div></div>

    <div id="modal-overlay" onclick="this.style.display='none'"><div id="modal-box" onclick="event.stopPropagation()">
        <h2 id="m-title" style="margin:0; font-size:26px;">分隊日誌</h2>
        <div id="m-body" style="margin-top:25px;"></div>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="width:100%; margin-top:30px; padding:18px; border:none; background:var(--primary); color:white; border-radius:15px; font-weight:900; cursor:pointer;">關閉</button>
    </div></div>

    <script>
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x020617);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(450, 480, 450); 
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('webgl-canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(200, 600, 150); dirLight.castShadow = true;
        scene.add(dirLight);

        const grid = new THREE.GridHelper(3000, 40, 0x1e293b, 0x0f172a); scene.add(grid);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({color:0x020617}));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

        // 皇冠模型 (Ace Crown)
        const crownGroup = new THREE.Group();
        const crownBase = new THREE.Mesh(new THREE.TorusGeometry(18, 2, 8, 20), new THREE.MeshStandardMaterial({color: 0xfde047, emissive: 0xfde047, emissiveIntensity: 2}));
        crownGroup.add(crownBase);
        for(let i=0; i<4; i++){
            const spike = new THREE.Mesh(new THREE.ConeGeometry(5, 12, 4), new THREE.MeshStandardMaterial({color:0xfde047}));
            spike.position.set(Math.cos(i*Math.PI/2)*18, 6, Math.sin(i*Math.PI/2)*18);
            crownGroup.add(spike);
        }
        crownGroup.position.set(0, -100, 0); // 初始隱藏
        scene.add(crownGroup);

        const buildings = {}; const bObjs = []; const labelData = {};
        function addB(id, name, color, h, x, z) {
            const group = new THREE.Group(); group.position.set(x, 0, z);
            const body = new THREE.Mesh(new THREE.BoxGeometry(40, h, 40), new THREE.MeshStandardMaterial({ color, metalness: 0.8 }));
            body.position.y = h/2; body.castShadow = true; group.add(body);
            const roof = new THREE.Mesh(new THREE.CylinderGeometry(15, 15, 8, 4), new THREE.MeshStandardMaterial({color:0xffffff, emissive:0x0ea5e9}));
            roof.position.y = h; group.add(roof);
            group.userData = { id, name }; scene.add(group); 
            buildings[id] = group; bObjs.push(body); body.userData = group.userData;
            const lbl = document.createElement('div'); lbl.className = 'price-label';
            document.getElementById('label-container').appendChild(lbl);
            labelData[id] = { element: lbl, object: group, height: h };
        }

        addB('BTC', 'BTC 總部', 0x1e293b, 120, -120, -120);
        addB('ETH', 'ETH 核心', 0x334155, 95, 120, -120);
        addB('SOL', 'SOL 站台', 0x0f172a, 75, -120, 120);
        addB('XAUT', 'XAUT 黃金', 0xf59e0b, 100, 200, -120);
        addB('PEPE', 'PEPE 特遣', 0x14532d, 55, 120, 120);
        addB('TREASURY', '中央金庫', 0x92400e, 65, 0, 0);

        const newsGroup = new THREE.Group(); newsGroup.position.set(250, 0, 0);
        const nwBody = new THREE.Mesh(new THREE.BoxGeometry(60, 140, 60), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
        nwBody.position.y = 70; newsGroup.add(nwBody); scene.add(newsGroup); bObjs.push(nwBody); nwBody.userData = {id: 'NEWS', name: '新聞總站'};
        labelData['NEWS'] = { element: document.createElement('div'), object: newsGroup, height: 140 };
        labelData['NEWS'].element.className = 'price-label'; labelData['NEWS'].element.innerText = '新聞總站'; 
        document.getElementById('label-container').appendChild(labelData['NEWS'].element);

        const radarGroup = new THREE.Group(); radarGroup.position.set(-250, 0, -250);
        const rdBody = new THREE.Mesh(new THREE.CylinderGeometry(10, 25, 160, 8), new THREE.MeshStandardMaterial({ color: 0x475569 }));
        rdBody.position.y = 80; radarGroup.add(rdBody); scene.add(radarGroup); bObjs.push(rdBody); radarGroup.userData = {id: 'SPECIAL', name: '雷達特遣部隊'};
        labelData['SPECIAL'] = { element: document.createElement('div'), object: radarGroup, height: 160 };
        labelData['SPECIAL'].element.className = 'price-label'; document.getElementById('label-container').appendChild(labelData['SPECIAL'].element);

        function animate() {
            requestAnimationFrame(animate); controls.update();
            crownGroup.rotation.y += 0.05;
            crownGroup.position.y = Math.sin(Date.now()*0.005)*5 + crownGroup.userData.baseY;
            for(let id in labelData) {
                const vec = new THREE.Vector3(labelData[id].object.position.x, labelData[id].height + 35, labelData[id].object.position.z);
                vec.project(camera);
                const x = (vec.x*0.5+0.5)*window.innerWidth; const y = (-(vec.y*0.5-0.5)*window.innerHeight);
                labelData[id].element.style.left = x + 'px'; labelData[id].element.style.top = y + 'px';
                labelData[id].element.style.display = (vec.z < 1 && x > 0 && x < window.innerWidth) ? 'block' : 'none';
            }
            renderer.render(scene, camera);
        }
        animate();

        async function sync() {
            try {
                const r = await fetch('/api/stats'); const d = await r.json();
                document.getElementById('rev-all').innerText = `${d.total_pnl.toFixed(1)} U`;
                document.getElementById('rev-today').innerText = `${d.today_pnl.toFixed(1)}`;
                document.getElementById('clock-tpe').innerText = d.tpe_time; document.getElementById('clock-ny').innerText = d.ny_time;
                document.getElementById('rt-log').innerText = d.round_table_log;
                document.getElementById('daily-debrief').innerText = d.daily_debrief;
                document.getElementById('taiex-status').innerText = `${d.taiex_info.status} | ${d.taiex_info.countdown}`;
                document.getElementById('sp500-status').innerText = `${d.sp500_info.status} | ${d.sp500_info.countdown}`;
                if(d.ace_agent && buildings[d.ace_agent]) {
                    const b = buildings[d.ace_agent]; crownGroup.position.x = b.position.x; crownGroup.position.z = b.position.z;
                    crownGroup.userData.baseY = labelData[d.ace_agent].height + 15;
                }
                const aList = document.getElementById('agent-list'); aList.innerHTML = '';
                ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XAUT/USDT', 'PEPE/USDT', 'SPECIAL'].forEach(s => {
                    const h = d.agent_health[s] || { status: 'OFFLINE', mode: '?' };
                    const lC = h.status === 'OK' ? 'light-ok' : 'light-err';
                    aList.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${s}</span><div class="${lC}" style="width:12px; height:12px; border-radius:50%;"></div></div>`;
                });
                for(let id in labelData) {
                    if (id === 'NEWS') continue;
                    const p = d.prices[id === 'TREASURY' ? 'BTC' : (id === 'SPECIAL' ? 'BTC' : id)];
                    if(p && !isNaN(p) && p != "0.0") labelData[id].element.innerText = `${id}: $${parseFloat(p).toLocaleString()}`;
                }
                window.liveData = d;
            } catch(e) {}
        }
        setInterval(sync, 4000); sync();
        async function fetchNews() {
            try {
                const r = await fetch('/api/news'); const d = await r.json();
                document.getElementById('global-ticker').innerText = [...d.crypto_news.slice(0,3), ...d.intl_news.slice(0,3)].join(' ✦ ');
            } catch(e){}
        }
        setInterval(fetchNews, 60000); fetchNews();

        window.addEventListener('click', e => {
            if(e.target.closest('.panel-box')) return;
            const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(bObjs);
            if(hits.length > 0) {
                const ud = hits[0].object.userData;
                const acc = window.liveData?.team_accounts[ud.id + '/USDT'] || window.liveData?.team_accounts[ud.id] || {cash:300, initial:300};
                const pos = (window.liveData?.positions || []).find(p => p.symbol.includes(ud.id));
                const pnl = pos ? pos.pnl : 0;
                document.getElementById('m-title').innerText = `🛡️ ${ud.name}`;
                document.getElementById('m-body').innerHTML = `<div style="background:#f8fafc; padding:20px; border-radius:20px;">
                    <div style="display:flex; justify-content:space-between;"><span>可用現金</span><span style="font-weight:900;">${acc.cash.toFixed(1)} U</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>累計浮動盈虧</span><span style="font-weight:900; color:var(--ok);">${pnl >=0?'+':''}${pnl.toFixed(2)} U</span></div>
                    <div style="margin-top:10px; font-size:12px; color:#94a3b8;">${window.liveData?.thoughts[ud.id] || ''}</div>
                </div>`;
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
