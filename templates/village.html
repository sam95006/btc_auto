<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI City Builder | 2026 模擬城市終極版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #00d2ff;
            --gold: #ffcc00;
            --green: #4ade80;
            --panel-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #87ceeb;
            font-family: 'Outfit', sans-serif; user-select: none;
        }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 遊戲級 HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .hud-bubble {
            position: absolute; background: var(--panel-bg); backdrop-filter: blur(10px);
            border-radius: 40px; padding: 12px 25px; pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid white;
            display: flex; align-items: center; gap: 15px; color: #1e293b;
        }

        #top-left { top: 25px; left: 25px; }
        #top-right { top: 25px; right: 25px; }

        .poi-label {
            position: absolute; background: white; border: 2px solid var(--primary);
            color: #1e293b; padding: 6px 12px; border-radius: 12px;
            font-size: 13px; font-weight: 900; cursor: pointer; pointer-events: auto;
            transform: translate(-50%, -100%); transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .poi-label:hover { transform: translate(-50%, -105%) scale(1.1); }

        /* 沉浸彈窗 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5000;
            pointer-events: auto; backdrop-filter: blur(5px);
        }
        #modal-content {
            background: white; width: 85%; max-width: 500px; border-radius: 30px;
            padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); position: relative;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-close { position: absolute; top: 25px; right: 25px; cursor: pointer; font-size: 24px; color: #94a3b8; }
        .data-card { background: #f8fafc; border-radius: 20px; padding: 20px; margin-top: 15px; }
        
        #instructions { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="webgl-container"></div>
    <div id="hud">
        <div class="hud-bubble" id="top-left">
            <div style="font-size: 28px;">🤵</div>
            <div>
                <div style="font-size: 11px; font-weight: 900; color: #64748b;">CITY MAYOR</div>
                <div style="font-size: 16px; font-weight: 900; color: #0f172a;" id="status-text">一切運行順利</div>
            </div>
        </div>

        <div class="hud-bubble" id="top-right">
            <div style="text-align: right;">
                <div style="font-size: 11px; font-weight: 900; color: #64748b;">GLOBAL REVENUE</div>
                <div style="font-size: 20px; font-weight: 900; color: #059669;" id="total-pnl">$0.00 U</div>
            </div>
            <div style="font-size: 28px;">🏦</div>
        </div>

        <div id="labels-container"></div>
        <div id="instructions">拖拽旋轉視角 · 點擊建築查看報表</div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <h2 id="m-title" style="margin: 0; font-size: 1.5rem; font-weight: 900;">建築資訊</h2>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        // --- 1. Three.js 世界構建：陽光明亮風 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 蔚藍天空
        scene.fog = new THREE.Fog(0x87ceeb, 50, 200);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.set(60, 60, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1;

        // 次世代光影
        const skyLight = new THREE.HemisphereLight(0xffffff, 0x081708, 0.8);
        scene.add(skyLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        scene.add(sunLight);

        // --- 2. 地貌細節：SimCity 質感 ---
        // 基礎草地
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x55aa55 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 市中心區塊 (灰色水泥)
        const cityGeo = new THREE.PlaneGeometry(100, 100);
        const cityMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
        const cityPlate = new THREE.Mesh(cityGeo, cityMat);
        cityPlate.rotation.x = -Math.PI / 2;
        cityPlate.position.y = 0.1;
        cityPlate.receiveShadow = true;
        scene.add(cityPlate);

        // 馬路系統
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
        const roadH = new THREE.Mesh(new THREE.PlaneGeometry(100, 10), roadMat);
        roadH.rotation.x = -Math.PI / 2;
        roadH.position.y = 0.2;
        scene.add(roadH);

        const roadV = new THREE.Mesh(new THREE.PlaneGeometry(10, 100), roadMat);
        roadV.rotation.x = -Math.PI / 2;
        roadV.position.y = 0.2;
        scene.add(roadV);

        // --- 3. 建築物資料對應 ---
        const buildings = [
            { id: 'BTC', name: 'BTC 摩天中心', color: 0x3b82f6, h: 25, x: -20, z: -20 },
            { id: 'ETH', name: 'ETH 工事坊', color: 0xa855f7, h: 18, x: 25, z: -15 },
            { id: 'SOL', name: 'SOL 觀察台', color: 0x10b981, h: 15, x: -20, z: 25 },
            { id: 'TREASURY', name: '中央金庫', color: 0xf59e0b, h: 20, x: 0, z: 0 }
        ];

        const labelContainer = document.getElementById('labels-container');
        buildings.forEach(b => {
            // 創建高品質 3D 建築
            const geo = new THREE.BoxGeometry(6, b.h, 6);
            const mat = new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.1, metalness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(b.x, b.h/2, b.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            b.mesh = mesh;

            // 創建標籤
            const div = document.createElement('div');
            div.className = 'poi-label';
            div.id = `label-${b.id}`;
            div.innerText = b.name;
            div.onclick = () => {
                if(b.id === 'TREASURY') showTreasury();
                else showAgent(b.id);
            };
            labelContainer.appendChild(div);
            b.label = div;
        });

        // --- 4. 渲染迴圈與座標映射 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const tempV = new THREE.Vector3();
            buildings.forEach(b => {
                tempV.set(b.x, b.h + 2, b.z); // 標籤浮在頂部
                tempV.project(camera);
                
                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;

                if (tempV.z < 1) {
                    b.label.style.display = 'block';
                    b.label.style.left = `${x}px`;
                    b.label.style.top = `${y}px`;
                } else {
                    b.label.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 5. 數據交互系統 ---
        function updateData() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = `$${data.total_pnl.toFixed(2)} U`;
                // 動態反應天氣或狀態
                const activeCount = data.positions.length;
                document.getElementById('status-text').innerText = activeCount > 0 ? `目前有 ${activeCount} 組特工出擊中` : `小鎮目前安靜祥和`;

                // 讓出入任務的建築物高亮
                buildings.forEach(b => {
                    const isActive = data.positions.some(p => p.symbol === b.id);
                    if(isActive) b.mesh.material.emissive.setHex(0x55ff55);
                    else b.mesh.material.emissive.setHex(0x000000);
                });
            }).catch(e => console.log("API Syncing..."));
        }
        setInterval(updateData, 5000); updateData();

        const modal = document.getElementById('modal-overlay');
        function closeModal() { modal.style.display = 'none'; }

        function showAgent(id) {
            document.getElementById('m-title').innerText = `🏢 ${id} 指揮部報表`;
            fetch(`/api/agent/${id}`).then(r => r.json()).then(data => {
                document.getElementById('m-body').innerHTML = `
                    <div class="data-card">
                        <div style="font-size: 11px; color: #64748b; font-weight: 800;">首席分析師指令</div>
                        <div style="margin-top: 10px; font-weight: 700; color: #1e293b; line-height: 1.5;">"${data.decision}"</div>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div class="data-card" style="flex: 1;">
                            <div style="font-size: 11px; color: #64748b; font-weight: 800;">當前盈虧</div>
                            <div style="font-size: 24px; font-weight: 900; color: #10b981; margin-top: 5px;">${data.summary.total_pnl.toFixed(2)} U</div>
                        </div>
                        <div class="data-card" style="flex: 1;">
                            <div style="font-size: 11px; color: #64748b; font-weight: 800;">任務狀態</div>
                            <div style="font-size: 20px; font-weight: 900; color: #3b82f6; margin-top: 5px;">${data.current_pos ? '執行任務中' : '待田中'}</div>
                        </div>
                    </div>
                `;
                modal.style.display = 'flex';
            });
        }

        function showTreasury() {
            document.getElementById('m-title').innerText = `💰 小鎮中央金庫`;
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('m-body').innerHTML = `
                    <div class="data-card" style="text-align: center;">
                        <div style="font-size: 12px; color: #64748b; font-weight: 800; letter-spacing: 2px;">LIFETIME NET WORTH</div>
                        <div style="font-size: 42px; font-weight: 900; color: #f59e0b; margin-top: 10px;">$${data.stats.all_time.toFixed(2)} U</div>
                    </div>
                `;
                modal.style.display = 'flex';
            });
        }
    </script>
</body>
</html>
