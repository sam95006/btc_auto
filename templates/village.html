<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading SimCity | 2026 完全體版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #00d2ff;
            --gold: #ffcc00;
            --green: #22c55e;
            --label-bg: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #87ceeb; /* 天空藍 */
            font-family: 'Outfit', sans-serif; user-select: none;
        }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }

        /* 遊戲層 HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* 增加標籤可點擊性 */
        .poi-label {
            position: absolute; background: var(--label-bg); border: 2.5px solid var(--primary);
            color: #0f172a; padding: 8px 16px; border-radius: 15px;
            font-size: 14px; font-weight: 900; cursor: pointer; pointer-events: auto;
            transform: translate(-50%, -100%); transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            z-index: 100;
        }
        .poi-label:hover { transform: translate(-50%, -105%) scale(1.15); border-color: var(--gold); }
        .poi-sub { font-size: 10px; color: #64748b; font-weight: 700; }

        /* HUD 氣泡 */
        .hud-bubble {
            position: absolute; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-radius: 50px; padding: 12px 30px; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid white;
            display: flex; align-items: center; gap: 15px; color: #1e293b;
        }
        #top-left { top: 30px; left: 30px; }
        #top-right { top: 30px; right: 30px; }

        /* 彈窗 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); display: none; justify-content: center; align-items: center; z-index: 5000;
            pointer-events: auto; backdrop-filter: blur(8px);
        }
        #modal-box {
            background: white; width: 90%; max-width: 550px; border-radius: 40px;
            padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.25); position: relative;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 30px; right: 35px; cursor: pointer; font-size: 28px; color: #cbd5e1; }
        .data-card { background: #f1f5f9; border-radius: 25px; padding: 25px; margin-top: 20px; border-left: 8px solid var(--primary); }

        #bottom-ticker {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70%; background: rgba(255,255,255,0.8); padding: 10px 30px; border-radius: 30px;
            font-size: 13px; font-weight: 700; color: #334155; text-align: center;
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>

    <div id="hud">
        <div class="hud-bubble" id="top-left">
            <div style="font-size: 30px;">👔</div>
            <div>
                <div style="font-size: 11px; font-weight: 900; color: #64748b;">SIMCITY MAYOR</div>
                <div id="mayor-msg" style="font-size: 16px; font-weight: 900; color: #1e293b;">全鎮高效運作中</div>
            </div>
        </div>

        <div class="hud-bubble" id="top-right">
            <div style="text-align: right;">
                <div style="font-size: 11px; font-weight: 900; color: #64748b;">TREASURY ASSETS</div>
                <div style="font-size: 20px; font-weight: 900; color: #059669;" id="total-pnl">Loading...</div>
            </div>
            <div style="font-size: 30px;">🏦</div>
        </div>

        <div id="labels-container"></div>
        <div id="bottom-ticker">正在同步全球節點與 AI 特工傳輸日誌...</div>
    </div>

    <!-- 彈窗內容 -->
    <div id="modal-overlay">
        <div id="modal-box">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <h2 id="m-title" style="margin:0; font-weight:900; font-size:1.8rem;">建物詳情</h2>
            <div id="m-body"></div>
        </div>
    </div>

    <script>
        // --- 1. 次世代 Three.js 渲染配置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 陽光天空
        scene.fog = new THREE.Fog(0x87ceeb, 80, 250);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(70, 80, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.15;

        // 次世代採光
        const hLight = new THREE.HemisphereLight(0xffffff, 0x081708, 0.7);
        scene.add(hLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 150, 100);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun);

        // --- 2. 城市地形裝飾 ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x55aa55 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 核心繁華區
        const district = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0x94a3b8 }));
        district.rotation.x = -Math.PI / 2;
        district.position.y = 0.1;
        district.receiveShadow = true;
        scene.add(district);

        // 公園與河流
        const river = new THREE.Mesh(new THREE.PlaneGeometry(30, 150), new THREE.MeshStandardMaterial({ color: 0x00d2ff, roughness: 0, metalness: 0.5 }));
        river.rotation.x = -Math.PI / 2;
        river.position.set(60, 0.2, 0);
        scene.add(river);

        // 道路網
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
        const rd1 = new THREE.Mesh(new THREE.PlaneGeometry(150, 12), roadMat);
        rd1.rotation.x = -Math.PI / 2; rd1.position.y = 0.15; scene.add(rd1);
        const rd2 = new THREE.Mesh(new THREE.PlaneGeometry(12, 150), roadMat);
        rd2.rotation.x = -Math.PI / 2; rd2.position.y = 0.15; scene.add(rd2);

        // --- 3. 建築物管理 (完全版) ---
        const buildings = [
            { id: 'BTC', name: 'BTC 數據摩天塔', color: 0x0ea5e9, h: 30, x: -30, z: -30, type: 'agent' },
            { id: 'ETH', name: 'ETH 分析中心', color: 0x8b5cf6, h: 22, x: 30, z: -30, type: 'agent' },
            { id: 'SOL', name: 'SOL 觀察站', color: 0x10b981, h: 18, x: -35, z: 35, type: 'agent' },
            { id: 'PEPE', name: '🐸 PEPE 基地', color: 0x22c55e, h: 12, x: 35, z: 35, type: 'agent' },
            { id: 'TREASURY', name: '💰 中央總部金庫', color: 0xfacc15, h: 25, x: 0, z: 0, type: 'treasury' },
            { id: 'NEWS', name: '📜 新聞報訊總部', color: 0xd1d5db, h: 15, x: 0, z: 35, type: 'macro' },
            { id: 'SCANNER', name: '📡 全球掃描雷達', color: 0xff4444, h: 40, x: -50, z: 0, type: 'scanner' }
        ];

        const labelContainer = document.getElementById('labels-container');
        buildings.forEach(b => {
            // 模型
            const geo = new THREE.BoxGeometry(8, b.h, 8);
            const mat = new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.2, metalness: 0.4 });
            const m = new THREE.Mesh(geo, mat);
            m.position.set(b.x, b.h/2, b.z);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
            b.mesh = m;

            // 標籤力場 (增加 pointer-events)
            const label = document.createElement('div');
            label.className = 'poi-label';
            label.innerHTML = `${b.name}<div class="poi-sub">指令中</div>`;
            label.onclick = (e) => {
                e.stopPropagation();
                if(b.type === 'agent') showAgent(b.id);
                else if(b.id === 'TREASURY') showTreasury();
                else if(b.id === 'NEWS') showMacro();
                else if(b.id === 'SCANNER') showScanner();
                return false;
            };
            labelContainer.appendChild(label);
            b.label = label;
        });

        // --- 4. 精靈 AI 生命系統 ---
        const sprites = [];
        const spriteGeo = new THREE.SphereGeometry(1.5, 16, 16);
        const spriteMat = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 2 });
        
        for(let i=0; i<6; i++) {
            const s = new THREE.Mesh(spriteGeo, spriteMat);
            s.position.set(0, 5, 0);
            scene.add(s);
            sprites.push({ mesh: s, target: {x:0, z:0}, state: 'IDLE' });
        }

        function updateSprites() {
            sprites.forEach(s => {
                if(Math.random() > 0.98) {
                    const dest = buildings[Math.floor(Math.random() * buildings.length)];
                    s.target = {x: dest.x, z: dest.z};
                }
                s.mesh.position.x += (s.target.x - s.mesh.position.x) * 0.01;
                s.mesh.position.z += (s.target.z - s.mesh.position.z) * 0.01;
                s.mesh.position.y = 2 + Math.sin(Date.now() * 0.005) * 2; // 跳動
            });
        }

        // --- 5. 數據交互與渲染迴圈 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateSprites();

            const tempV = new THREE.Vector3();
            buildings.forEach(b => {
                tempV.set(b.x, b.h + 2, b.z);
                tempV.project(camera);
                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                if(tempV.z < 1) {
                    b.label.style.display = 'flex';
                    b.label.style.left = `${x}px`;
                    b.label.style.top = `${y}px`;
                } else { b.label.style.display = 'none'; }
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 6. 資訊橋接 ---
        function updateAllData() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = `$${data.total_pnl.toFixed(2)} U`;
                document.getElementById('bottom-ticker').innerText = `🌍 市場動向: ${data.macro_report} | 當前獲利最高: ${data.total_pnl > 0 ? '🟢' : '🔴'}`;
                buildings.forEach(b => {
                    const active = data.positions.some(p => p.symbol === b.id);
                    if(active) b.mesh.material.emissive.setHex(0x00ff00);
                    else b.mesh.material.emissive.setHex(0x000000);
                });
            }).catch(e => console.log("等待數據同步中..."));
        }
        setInterval(updateAllData, 5000); updateAllData();

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function showAgent(id) {
            document.getElementById('m-title').innerText = `🏢 ${id} 指揮部數據`;
            fetch(`/api/agent/${id}`).then(r => r.json()).then(data => {
                document.getElementById('m-body').innerHTML = `
                    <div class="data-card"><h3>組長戰略分析</h3><p>${data.decision}</p></div>
                    <div class="data-card"><h3>當前盈虧</h3><p style="font-size:1.5rem; font-weight:900;">${data.summary.total_pnl.toFixed(2)} U</p></div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function showTreasury() {
            document.getElementById('m-title').innerText = `💰 小鎮總資產核算`;
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('m-body').innerHTML = `
                    <div class="data-card" style="text-align:center;"><h3>生涯總純利</h3><p style="font-size:2.5rem; color:var(--gold); font-weight:900;">$${data.stats.all_time.toFixed(2)} U</p></div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function showMacro() {
            document.getElementById('m-title').innerText = `📜 全球新聞報訊總覽`;
            document.getElementById('m-body').innerHTML = `<div class="data-card"><h3>宏觀情緒</h3><p id="macro-detail">正在抓取最新聯準會與新聞數據...</p></div>`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function showScanner() {
            document.getElementById('m-title').innerText = `📡 全球市場掃描雷達`;
            document.getElementById('m-body').innerHTML = `<div class="data-card"><h3>符合篩選大樓</h3><p>根據目前市場制度，推薦關注幣種：BTC, SOL, LINK</p></div>`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
