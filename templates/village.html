<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading SimCity Pro | 市長全能中心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --ui-accent: #00f3ff;
            --ui-warn: #ffcc00;
            --road-color: #475569;
            --grass-color: #38b000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020617; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* 🌆 3D 次世代視角 */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        /* 🗺️ 地圖本體 - 這次要「浮起來」並有邊緣厚度 */
        #map-platform {
            position: relative; width: 1200px; height: 1000px;
            background: var(--grass-color);
            transform: rotateX(55deg) rotateZ(-35deg);
            transform-style: preserve-3d;
            box-shadow: 20px 40px 60px rgba(0,0,0,0.8);
            border-bottom: 25px solid #1a2e05; /* 地板厚度 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 60px 60px;
        }

        /* 🛣️ 馬路 */
        .road { position: absolute; background: var(--road-color); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .road-v { left: 45%; width: 100px; height: 100%; }
        .road-h { top: 45%; height: 100px; width: 100%; }

        /* 🏗️ 建築物工廠：解決埋地問題，使用真實 Z-index 垂直偏移 */
        .building-site {
            position: absolute; width: 150px; height: 150px;
            transform-style: preserve-3d; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            transition: 0.3s;
        }
        /* 核心修正：將建築移出地平面，並加上正確的主軸旋轉 */
        .building-3d {
            width: 120px; height: 180px; /* 增加高度 */
            transform: rotateZ(35deg) rotateX(-55deg) translateY(-80px); /* 關鍵：垂直向上抬升並修正視角 */
            transform-origin: bottom center;
            filter: drop-shadow(40px 60px 20px rgba(0,0,0,0.4)); /* 正確的影子位置 */
        }
        .building-site:hover .building-3d { transform: rotateZ(35deg) rotateX(-55deg) translateY(-100px) scale(1.05); }

        /* 🏰 SVG 建築模型：2026 模擬城市感 */
        .model-svg { width: 100%; height: 100%; }

        /* 🏷️ 浮動標籤：固定在建築物頂端 */
        .label {
            position: absolute; top: -140px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--ui-accent); color: var(--ui-accent);
            padding: 5px 15px; border-radius: 20px; font-weight: 900;
            font-size: 14px; white-space: nowrap; pointer-events: none;
            box-shadow: 0 0 15px var(--ui-accent);
            transform: rotateZ(35deg) rotateX(-55deg);
        }

        /* 🧙 2026 HUD 管理面板 */
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; }
        .hud-p { 
            position: absolute; background: rgba(15,23,42,0.9); border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); color: white; border-radius: 40px; padding: 15px 30px;
            pointer-events: all; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 20px;
        }
        #p-top-l { top: 30px; left: 30px; border-left: 5px solid var(--ui-accent); }
        #p-top-r { top: 30px; right: 30px; border-right: 5px solid var(--ui-warn); }
        .p-icon { width: 50px; height: 50px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #333;}

        /* 🧪 彈窗介面 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        #modal-box {
            background: #1e293b; border: 3px solid var(--ui-accent); width: 80%; max-width: 600px;
            border-radius: 40px; padding: 40px; color: white; box-shadow: 0 0 100px rgba(0,243,255,0.2);
        }
        .card { background: #0f172a; padding: 20px; border-radius: 20px; margin-top: 15px; border-left: 5px solid var(--ui-accent); }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-p" id="p-top-l">
            <div class="p-icon" style="border-color: var(--ui-accent)">🏙️</div>
            <div>
                <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 800;">SIMCITY DISTRICT</div>
                <div style="font-size: 1.2rem; font-weight: 900;">小鎮市長中心</div>
            </div>
        </div>
        <div class="hud-p" id="p-top-r">
            <div style="text-align: right;">
                <div style="font-size: 0.7rem; color: #94a3b8; font-weight: 800;">CURRENT ASSETS</div>
                <div style="font-size: 1.5rem; font-weight: 900; color: var(--ui-warn);" id="total-pnl">$0.00 U</div>
            </div>
            <div class="p-icon" style="background: var(--ui-warn); color: #000;">💰</div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h2 id="m-title" style="margin:0; font-weight: 900;">特工指令日誌</h2>
            <div id="m-body"></div>
            <button onclick="closeModal()" style="width:100%; margin-top:25px; padding:15px; border-radius:20px; border:none; background:var(--ui-accent); color:#000; font-weight:900; cursor:pointer;">返回市長席位</button>
        </div>
    </div>

    <div id="viewport">
        <div id="map-platform">
            <div class="road road-v"></div>
            <div class="road road-h"></div>
            
            <!-- 🏢 BTC 摩天中心：次世代高品質 SVG 模型 -->
            <div class="building-site" style="top: 15%; left: 15%;" onclick="showAgent('BTC')">
                <div class="label" id="label-BTC">🏢 BTC MISSION COMMAND</div>
                <div class="building-3d">
                    <svg class="model-svg" viewBox="0 0 100 150">
                        <defs><linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" /><stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" /></linearGradient></defs>
                        <path d="M10 140 L10 40 L50 10 L90 40 L90 140 Z" fill="url(#grad1)" stroke="#fff" stroke-width="1"/>
                        <rect x="25" y="50" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                        <rect x="45" y="50" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                        <rect x="65" y="50" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                        <rect x="25" y="80" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                        <rect x="45" y="80" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                        <rect x="65" y="80" width="10" height="10" fill="#fff" fill-opacity="0.5"/>
                    </svg>
                </div>
            </div>

            <!-- 🏛️ 財政總部：宏偉圓頂模型 -->
            <div class="building-site" style="top: 38%; left: 42%;" onclick="showTreasury()">
                <div class="label" style="border-color: var(--ui-warn); color: var(--ui-warn);">🏛️ 小鎮中央總署</div>
                <div class="building-3d" style="width: 180px; height: 200px; transform: rotateZ(35deg) rotateX(-55deg) translateY(-100px);">
                    <svg class="model-svg" viewBox="0 0 150 150">
                        <rect x="30" y="80" width="90" height="60" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
                        <circle cx="75" cy="80" r="45" fill="#f59e0b" stroke="#000"/>
                        <rect x="65" y="100" width="20" height="40" fill="#475569"/>
                    </svg>
                </div>
            </div>

            <!-- 🏭 ETH 化工廠：工業感模型 -->
            <div class="building-site" style="top: 15%; right: 15%;" onclick="showAgent('ETH')">
                <div class="label" style="border-color: #8b5cf6; color: #8b5cf6;">🏭 ETH DATA MINT</div>
                <div class="building-3d">
                    <svg class="model-svg" viewBox="0 0 100 120">
                        <rect x="10" y="50" width="80" height="60" fill="#8b5cf6" stroke="#fff"/>
                        <rect x="20" y="10" width="15" height="40" fill="#444" />
                        <rect x="60" y="0" width="15" height="50" fill="#444" />
                        <path d="M75 10 Q85 0 95 10" stroke="#fff" fill="none" />
                    </svg>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateStats() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = `$${data.total_pnl.toFixed(2)} U`;
                data.positions.forEach(pos => {
                    const label = document.getElementById(`label-${pos.symbol}`);
                    if (label) {
                        label.innerText = `🏹 ${pos.symbol} MISSION ALIVE`;
                        label.style.borderColor = '#22c55e';
                        label.style.color = '#22c55e';
                    }
                });
            });
        }
        setInterval(updateStats, 5000); updateStats();

        function showAgent(name) {
            const body = document.getElementById('m-body');
            document.getElementById('m-title').innerText = `🏢 ${name} 指揮部回報`;
            fetch(`/api/agent/${name}`).then(r => r.json()).then(data => {
                body.innerHTML = `
                    <div class="card"><h3>👑 組長戰略指令</h3><p>"${data.decision}"</p></div>
                    <div class="card"><h3>📊 今日功勳績效</h3><p style="font-size:1.5rem; font-weight:900;">${data.summary.total_pnl.toFixed(2)} U</p></div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function showTreasury() {
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('m-title').innerText = `🏛️ 市政廳總理報表`;
                document.getElementById('m-body').innerHTML = `
                    <div class="card" style="text-align:center;">
                        <h3>小鎮總生產價值</h3>
                        <p style="font-size:2.5rem; color:var(--ui-warn); font-weight:900;">$${data.stats.all_time.toFixed(2)} U</p>
                    </div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
