<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 交易小鎮 | 管理中心</title>
    <style>
        :root {
            --grass: #2d5a27;
            --path: #8b7355;
            --sky-sunny: #87ceeb;
            --sky-rainy: #4a4a4a;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }
        #village-container {
            width: 100vw; height: 100vh;
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, #1a1a1a, #333);
        }
        #map {
            width: 1200px; height: 800px;
            background-color: var(--grass);
            position: relative;
            transform: rotateX(45deg) rotateZ(-30deg);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.5);
            border: 10px solid #111;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%),
                linear-gradient(45deg, transparent 48%, rgba(0,0,0,0.1) 50%, transparent 52%);
            background-size: 100% 100%, 50px 50px;
        }
        /* 路徑 */
        .path {
            position: absolute; background: var(--path);
            width: 60px; height: 100%; left: 50%; transform: translateX(-50%);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        .path-h {
            position: absolute; background: var(--path);
            width: 100%; height: 60px; top: 50%; transform: translateY(-50%);
        }

        /* 建築 */
        .building {
            position: absolute; width: 100px; height: 100px;
            transition: all 0.5s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            transform: rotateZ(30deg) rotateX(-45deg); /* 抵銷背景旋轉 */
        }
        .building:hover { transform: rotateZ(30deg) rotateX(-45deg) scale(1.1); filter: brightness(1.2); }
        
        .house { background: #dfa35b; border-radius: 10px; border: 3px solid #5d4037; position: relative;}
        .house::after { content: ''; position: absolute; top: -40px; left: -10px; border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 50px solid #a52a2a; }
        
        .mansion { width: 150px; height: 150px; background: #9e9e9e; border: 5px solid #424242; border-radius: 5px; }
        .mansion::after { content: 'NEWS'; color: white; position: absolute; top: 20%; width: 100%; text-align: center; font-weight: bold; }

        /* 小精靈 */
        .agent-elf {
            position: absolute; width: 30px; height: 30px;
            background: #ffeb3b; border-radius: 50%;
            box-shadow: 0 0 15px #ffeb3b;
            z-index: 100;
            transition: all 2s ease-in-out;
            transform: rotateZ(30deg) rotateX(-45deg);
        }
        .agent-elf::before { content: '👀'; font-size: 14px; display: block; text-align: center; line-height:30px;}

        /* 模態框 (彈窗) */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #modal-content {
            background: #222; border: 2px solid #00ff00; width: 80%; max-width: 800px;
            padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,255,0,0.2);
            position: relative; overflow-y: auto; max-height: 80vh;
        }
        .modal-close { position: absolute; top: 15px; right: 20px; color: white; cursor: pointer; font-size: 1.5rem; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .data-card { background: #333; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00; }
        .data-card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #00d2ff; }
    </style>
</head>
<body>
    <div id="rain-overlay"></div>
    <div id="modal-overlay">
        <div id="modal-content">
            <span class="modal-close" onclick="closeModal()">×</span>
            <h2 id="modal-title" style="color: #00ff00; border-bottom: 2px solid #444; padding-bottom: 10px;">🏛️ 情報中心報表</h2>
            <div id="modal-body" class="data-grid">
                <!-- 動態注入內容 -->
            </div>
        </div>
    </div>
    <div id="village-container">
        <div id="map">
            <div class="path"></div>
            <div class="path-h"></div>

            <!-- 情報中心 -->
            <div class="building mansion" style="top: 10%; left: 45%;" onclick="showMacro()">
                <div class="label">📜 全域情報中心</div>
            </div>

            <!-- 特工小屋 -->
            <div id="house-BTC" class="building house" style="top: 25%; left: 20%;" onclick="showAgent('BTC')">
                <div class="label">🤖 BTC 偵察屋</div>
            </div>
            <div id="house-ETH" class="building house" style="top: 25%; left: 70%;" onclick="showAgent('ETH')">
                <div class="label">🤖 ETH 偵察屋</div>
            </div>
            <div id="house-SOL" class="building house" style="top: 70%; left: 20%;" onclick="showAgent('SOL')">
                <div class="label">🤖 SOL 偵察屋</div>
            </div>
            <div id="house-PEPE" class="building house" style="top: 70%; left: 70%;" onclick="showAgent('PEPE')">
                <div class="label">🐸 PEPE 基地</div>
            </div>

            <!-- 空地 (未來開發) -->
            <div class="building" style="top: 75%; left: 45%; opacity: 0.3;">
                <div style="border: 2px dashed white; width: 100px; height: 100px;"></div>
                <div class="label">🏗️ 未來 AI 預留地</div>
            </div>

            <!-- 小精靈 -->
            <div id="elf-BTC" class="agent-elf"></div>
            <div id="elf-ETH" class="agent-elf"></div>
        </div>
    </div>

    <div id="info-panel">
        <div style="font-size: 1.25rem; font-weight: bold;">🏡 AI 交易小鎮系統</div>
        <div id="clock" style="color: #aaa;">00:00:00</div>
        <div id="weather" style="margin-top: 5px;">🌤️ 天氣: 晴朗</div>
        
        <div class="stats">
            <div>🌍 全球意識: <span id="global-bias">0.50</span></div>
            <div>💰 總盈虧: <span id="total-pnl" class="pnl-pos">+$0.00</span></div>
            <div>📈 運作中 AI: <span id="active-agents">6</span></div>
        </div>
        
        <div class="stats" id="news-ticker" style="font-size: 0.8rem; color: #00d2ff;">
            [系統預熱中... 準備撈取全球財經數據]
        </div>
    </div>

    <script>
        let lastData = null;

        function updateStats() {
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    lastData = data;
                    document.getElementById('global-bias').innerText = data.global_bias.toFixed(2);
                    // ...其餘代碼保持不變...
                    document.getElementById('total-pnl').innerText = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(2);
                    document.getElementById('total-pnl').className = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                    document.getElementById('news-ticker').innerText = data.macro_report;
                    
                    // 天氣聯動
                    if (data.global_bias < 0.45) {
                        document.getElementById('weather').innerText = '🌧️ 天氣: 暴雨 (宏觀看空)';
                        document.getElementById('rain-overlay').style.display = 'block';
                    } else {
                        document.getElementById('weather').innerText = '🌤️ 天氣: 晴朗 (宏觀看多)';
                        document.getElementById('rain-overlay').style.display = 'none';
                    }

                    // 小精靈移動邏輯 (模擬)
                    moveElves();
                });
        }

        function moveElves() {
            const houses = [
                {t: '25%', l: '20%'}, {t: '25%', l: '70%'}, 
                {t: '70%', l: '20%'}, {t: '70%', l: '70%'}
            ];
            const elfBtc = document.getElementById('elf-BTC');
            const target = houses[Math.floor(Math.random() * houses.length)];
            // 隨機跑到報社或是回房間
            if (Math.random() > 0.5) {
                elfBtc.style.top = '15%'; elfBtc.style.left = '48%';
            } else {
                elfBtc.style.top = '30%'; elfBtc.style.left = '25%';
            }
        }

        function showAgent(name) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `🤖 ${name} 偵察小屋回憶門`;
            
            fetch(`/api/agent/${name}`)
                .then(res => res.json())
                .then(data => {
                    let historyHtml = '<ul>';
                    data.history.forEach(h => {
                        const ctx = JSON.parse(h.market_context || '{}');
                        historyHtml += `
                            <li style="margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 5px;">
                                <div style="color: ${h.pnl >= 0 ? '#00ff00' : '#ff4444'}">
                                    [${h.timestamp}] ${h.signal_type}: ${h.pnl > 0 ? '+' : ''}${h.pnl.toFixed(2)} U
                                </div>
                                <div style="font-size: 0.8rem; color: #aaa;">
                                    🧠 當下意識: AI信心 ${(ctx.ml_prob || 0.5)*100}%, 趨勢: ${ctx.trend_15m || 'N/A'}<br>
                                    🌪️ 環境: TV ${ctx.tv_sentiment > 0.6 ? '看多' : '盤整'}, 巨鯨: ${ctx.whale_score || 1.0}
                                </div>
                            </li>`;
                    });
                    historyHtml += '</ul>';

                    body.innerHTML = `
                        <div class="data-card" style="grid-column: span 2;">
                            <h3>📊 今日成績單</h3>
                            <div>24H 盈虧: <span style="color: ${data.summary.total_pnl >= 0 ? '#00ff00' : '#ff4444'}">${data.summary.total_pnl.toFixed(2)} U</span></div>
                            <div>勝率: ${data.summary.win_rate} | 交易次數: ${data.summary.total_trades}</div>
                        </div>
                        <div class="data-card" style="grid-column: span 2;">
                            <h3>📜 近期決策回顧</h3>
                            ${historyHtml}
                        </div>
                    `;
                    document.getElementById('modal-overlay').style.display = 'flex';
                });
        }

        function showMacro() {
            if (!lastData) return;
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="data-card">
                    <h3>📊 TradingView 實時指標</h3>
                    <div>BTC: ${lastData.tv_sentiment.BTC > 0.6 ? '🟢 多頭' : '🔴 盤整'}</div>
                    <div>ETH: ${lastData.tv_sentiment.ETH > 0.6 ? '🟢 多頭' : '🔴 盤整'}</div>
                </div>
                <div class="data-card">
                    <h3>🐋 巨鯨動向</h3>
                    <div>BTC 鏈上信心: ${lastData.whale_data.BTC.toFixed(2)}</div>
                    <div>主要交易所: Binance Strong Buy</div>
                </div>
                <div class="data-card">
                    <h3>🏦 聯準會 & 美股</h3>
                    <div>今日總結: ${lastData.macro_report}</div>
                </div>
                <div class="data-card">
                    <h3>🤝 AI 圓桌會議結論</h3>
                    <div>昨日建議: 維持優化後 RSI 參數，等待美股開盤。</div>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
