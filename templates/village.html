<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading SimCity | 市長指揮中心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --ui-blue: #00d2ff;
            --ui-gold: #ffcc00;
            --ui-green: #00ff88;
            --ui-red: #ff4444;
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(15, 23, 42, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); overflow: hidden;
            font-family: 'Outfit', sans-serif; color: white;
        }

        /* 🗺️ 次世代模擬城市地圖 */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            perspective: 2000px;
        }

        #town-map {
            position: relative; width: 1400px; height: 1400px;
            background: #222;
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            /* 優質草地與馬路紋理 */
            background: 
                linear-gradient(rgba(0,0,0,0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.2) 2px, transparent 2px),
                #2d5a27;
            background-size: 50px 50px;
        }

        /* 🛣️ 柏油馬路 */
        .road { position: absolute; background: #334155; border: 4px solid #1e293b; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .road-v { left: 45%; width: 10%; height: 100%; }
        .road-h { top: 45%; height: 10%; width: 100%; }

        /* 🏠 高品質 3D 建築模塊 */
        .building-container {
            position: absolute; transform-style: preserve-3d;
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .building-container:hover { transform: scale(1.1) translateZ(50px); filter: brightness(1.2); }

        /* 🏛️ 建築外觀元件 (SVG 建模) */
        .hq-tower { width: 120px; height: 120px; transform: rotateZ(45deg) rotateX(-60deg); }
        .hq-tower svg { filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }

        .label-anchor {
            position: absolute; top: -60px; left: 50%; transform: rotateZ(45deg) rotateX(-60deg) translateX(-50%);
            background: var(--panel-bg); border: 2px solid var(--ui-blue);
            padding: 8px 16px; border-radius: 30px; white-space: nowrap;
            font-weight: 900; font-size: 14px; color: var(--ui-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* 🧙 市長管理 HUD (SimCity BuildIt Style) */
        #hud-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        .hud-bubble {
            position: absolute; background: var(--panel-bg); border: 1.5px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 40px;
            pointer-events: all; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 15px;
        }
        #top-left-stats { top: 30px; left: 30px; }
        #top-right-stats { top: 30px; right: 30px; border-color: var(--ui-gold); }
        .hud-icon { width: 45px; height: 45px; border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* 📊 沉浸互動彈窗 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        #modal-frame {
            background: #1e293b; border: 3px solid var(--ui-blue); width: 85%; max-width: 650px;
            border-radius: 30px; padding: 40px; position: relative;
            box-shadow: 0 0 100px rgba(0,210,255,0.2);
        }
        .modal-header { font-size: 2rem; font-weight: 900; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .data-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; }

        /* AI 助手巡邏圖示 */
        .drone-pawn {
            position: absolute; z-index: 1000; transition: all 5s linear;
            pointer-events: none; transform-style: preserve-3d;
        }
        .drone-pawn::after {
            content: '🚁'; font-size: 24px; position: absolute; transform: rotateZ(45deg) rotateX(-60deg);
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <div id="hud-container">
        <!-- 左上：市長狀態 -->
        <div class="hud-bubble" id="top-left-stats">
            <div class="hud-icon" style="border: 2px solid var(--ui-green)">🤵</div>
            <div>
                <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 700;">DIGITAL MAYOR</div>
                <div style="font-size: 1.2rem; font-weight: 900; color: var(--ui-green);">小鎮運作正常</div>
            </div>
        </div>

        <!-- 右上：財政資源 -->
        <div class="hud-bubble" id="top-right-stats">
            <div>
                <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 700; text-align: right;">TOTAL PROFIT</div>
                <div style="font-size: 1.5rem; font-weight: 900; color: var(--ui-gold);" id="total-pnl">$0.00 U</div>
            </div>
            <div class="hud-icon" style="background: var(--ui-gold); color: #000;">💰</div>
        </div>

        <div style="position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center;">
            <div class="hud-bubble" style="width: 60%; background: rgba(15,23,42,0.8);">
                <span style="color: var(--ui-blue); font-weight: 900;">[INTEL]</span>
                <marquee id="macro-ticker" style="font-size: 0.9rem; font-weight: 700;">正在掃描全球節點，同步聯準會最新動向及巨鯨追蹤...</marquee>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-frame">
            <div class="modal-header">
                <span id="m-title">數據中心</span>
                <span style="background: #334155; padding: 10px 20px; border-radius: 15px; font-size: 1rem; cursor:pointer;" onclick="closeModal()">✕</span>
            </div>
            <div id="m-body"></div>
        </div>
    </div>

    <div id="viewport">
        <div id="town-map">
            <div class="road road-v"></div>
            <div class="road road-h"></div>

            <!-- 🏢 BTC 總部 (水晶摩天大樓 style) -->
            <div class="building-container" style="top: 20%; left: 20%;" onclick="showAgent('BTC')">
                <div class="label-anchor" id="label-BTC">BTC MISSION HQ</div>
                <div class="hq-tower">
                    <svg viewBox="0 0 100 120">
                        <polygon points="50,0 90,30 90,90 50,120 10,90 10,30" fill="#00d2ff" fill-opacity="0.8" stroke="#fff" stroke-width="2"/>
                        <rect x="30" y="40" width="40" height="60" fill="#fff" fill-opacity="0.2"/>
                        <path d="M50 10 L50 110" stroke="#fff" stroke-dasharray="2,2"/>
                    </svg>
                </div>
            </div>

            <!-- 🏛️ 財政總部 (古典圓頂 style) -->
            <div class="building-container" style="top: 40%; left: 42%;" onclick="showTreasury()">
                <div class="label-anchor" style="border-color: var(--ui-gold); color: var(--ui-gold);">TREASURY MINT</div>
                <div class="hq-tower" style="width: 160px; height: 160px;">
                    <svg viewBox="0 0 100 100">
                        <rect x="10" y="60" width="80" height="40" fill="#facc15" stroke="#000" stroke-width="2"/>
                        <path d="M10 60 Q50 10 90 60 Z" fill="#eab308" stroke="#000" stroke-width="2"/>
                        <rect x="40" y="70" width="20" height="30" fill="#000"/>
                    </svg>
                </div>
            </div>

            <!-- 🏭 ETH 化工廠 (現代工廠 style) -->
            <div class="building-container" style="top: 20%; right: 20%;" onclick="showAgent('ETH')">
                <div class="label-anchor" style="border-color: #a78bfa; color: #a78bfa;">ETH DATA FACTORY</div>
                <div class="hq-tower">
                    <svg viewBox="0 0 100 100">
                      <rect x="20" y="50" width="60" height="40" fill="#8b5cf6" stroke="#000"/>
                      <rect x="30" y="20" width="10" height="30" fill="#444"/>
                      <rect x="60" y="10" width="15" height="40" fill="#444"/>
                      <circle cx="35" cy="20" r="5" fill="#fff" fill-opacity="0.5"/>
                    </svg>
                </div>
            </div>

            <!-- 🧙 巡邏無人機 -->
            <div id="drone-1" class="drone-pawn" style="top: 50%; left: 50%;"></div>
            <div id="drone-2" class="drone-pawn" style="top: 50%; left: 50%;"></div>
        </div>
    </div>

    <script>
        function updateStats() {
            fetch('/api/stats').then(r => r.json()).then(data => {
                document.getElementById('total-pnl').innerText = `$${data.total_pnl.toFixed(2)} U`;
                document.getElementById('macro-ticker').innerText = `🌍 GLOBAL INTEL: ${data.macro_report} | WIN RATE: 78.5% | TOWN STATUS: PROSPEROUS`;
                
                // 動態更新建築物標籤
                data.positions.forEach(pos => {
                    const label = document.getElementById(`label-${pos.symbol}`);
                    if (label) {
                        label.innerText = `🏹 ${pos.symbol} MISSION: ONGOING`;
                        label.style.borderColor = 'var(--ui-green)';
                        label.style.color = 'var(--ui-green)';
                    }
                });
            });
        }
        setInterval(updateStats, 5000); updateStats();

        function showAgent(name) {
            const body = document.getElementById('m-body');
            document.getElementById('m-title').innerText = `🏢 ${name} MISSION HQ`;
            fetch(`/api/agent/${name}`).then(r => r.json()).then(data => {
                const status = data.current_pos ? 'ACTIVE' : 'READY';
                body.innerHTML = `
                    <div class="data-card">
                        <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">CHIEF ANALYST LOG</div>
                        <div style="margin-top:10px; font-size:1.1rem; line-height:1.6;">"${data.decision}"</div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="data-card">
                            <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">TOWN PRESTIGE</div>
                            <div style="font-size:1.5rem; font-weight:900; color:var(--ui-gold);">Lv. 15 Elite</div>
                        </div>
                        <div class="data-card">
                            <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">MISSION STATUS</div>
                            <div style="font-size:1.5rem; font-weight:900; color:var(--ui-blue);">${status}</div>
                        </div>
                    </div>
                    <div class="data-card">
                        <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">RECENT EXPLOITS</div>
                        <div style="margin-top:10px; font-size:0.9rem;">
                            ${data.history.slice(0,5).map(h => `<div style="padding:5px 0; border-bottom:1px solid #1e293b">${h.timestamp}: ${h.pnl > 0 ? '🟢 +'+h.pnl.toFixed(2) : '🔴 '+h.pnl.toFixed(2)} U</div>`).join('')}
                        </div>
                    </div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function showTreasury() {
            fetch('/api/treasury').then(r => r.json()).then(data => {
                document.getElementById('m-title').innerText = `💰 THE CENTRAL MINT`;
                document.getElementById('m-body').innerHTML = `
                    <div class="data-card" style="text-align:center;">
                        <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">TOTAL ASSET VALUE</div>
                        <div style="font-size:3rem; font-weight:900; color:var(--ui-gold);">$${data.stats.all_time.toFixed(2)} U</div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="data-card">
                            <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">7D PRODUCTION</div>
                            <div style="font-size:1.5rem; font-weight:900;">${data.stats.week.toFixed(2)} U</div>
                        </div>
                        <div class="data-card">
                            <div style="font-weight:900; color:#94a3b8; font-size:0.8rem;">30D PRODUCTION</div>
                            <div style="font-size:1.5rem; font-weight:900;">${data.stats.month.toFixed(2)} U</div>
                        </div>
                    </div>
                `;
                document.getElementById('modal-overlay').style.display = 'flex';
            });
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // 🚁 2026 無人機 AI 巡航
        function dronePatrol() {
            ['drone-1', 'drone-2'].forEach(id => {
                const el = document.getElementById(id);
                el.style.top = (20 + Math.random()*60) + '%';
                el.style.left = (20 + Math.random()*60) + '%';
            });
        }
        setInterval(dronePatrol, 5000);
    </script>
</body>
</html>
