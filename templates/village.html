<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropolis v6.1 | SimCity Command</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        :root { --primary: #00f2ff; --gold: #ffd700; --ok: #00ff9d; --err: #ff0055; --bg: #050a14; --glass: rgba(10, 20, 40, 0.85); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; }

        /* 全息掃描線疊層 */
        #hologram-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0.1) 1px, transparent 2px); pointer-events: none; z-index: 100; opacity: 0.3; }
        
        #hud-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
        
        .game-panel { 
            position: relative; pointer-events: auto; background: var(--glass); 
            border: 1px solid rgba(0, 242, 255, 0.3);
            clip-path: polygon(0 0, 90% 0, 100% 20px, 100% 100%, 10px 100%, 0 90%);
            padding: 20px; box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1), 0 10px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
        }
        .game-panel::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary);
        }
        
        #left-stack { position: absolute; top: 30px; left: 30px; display: flex; flex-direction: column; gap: 20px; }
        #right-stack { position: absolute; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 20px; }
        #bottom-stack { position: absolute; bottom: 80px; right: 30px; width: 240px; }

        .price-label { 
            position: absolute; color: var(--primary); font-size: 11px; font-weight: 900; pointer-events: none;
            text-shadow: 0 0 10px var(--primary); background: rgba(0,0,0,0.7); padding: 4px 10px;
            border: 1px solid var(--primary); clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }

        #news-ticker { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); 
            border-top: 2px solid var(--primary); padding: 10px 0; z-index: 300;
        }
        .ticker { color: var(--primary); font-family: 'Courier New', monospace; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes pulse-glow { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .ace-tag { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 24px; animation: pulse-glow 1s infinite; }
    </style>
</head>
<body>
    <div id="hologram-overlay"></div>
    <div id="webgl-container" style="position: absolute; width:100%; height:100%; cursor: grab;"></div>
    <div id="label-container" style="position: absolute; width:100%; height:100%; pointer-events: none; z-index: 5;"></div>

    <div id="hud-container">
        <div id="left-stack">
            <div class="game-panel" style="width: 320px;">
                <div style="font-size: 11px; font-weight:900; color:var(--primary); letter-spacing:3px; margin-bottom:15px; border-bottom:1px solid rgba(0,242,255,0.2); padding-bottom:8px;">TACTICAL COMMAND v6.4</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span><small>INDEX</small> TAIEX</span><span id="taiex-status" style="color:var(--primary); font-family:monospace;">SCANNING...</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><span><small>INDEX</small> S&P 500</span><span id="sp500-status" style="color:var(--gold); font-family:monospace;">SCANNING...</span></div>
                
                <div style="background:rgba(0,242,255,0.05); padding:15px; border-radius:4px; border-left:4px solid var(--primary);">
                    <div style="font-size:10px; color:var(--primary); opacity:0.6; margin-bottom:6px;">CENTRAL TREASURY RESERVE</div>
                    <div style="font-size:28px; font-weight:900; color:var(--primary); letter-spacing:-1px;">1000.0 <small style="font-size:14px;">USDT</small></div>
                </div>
            </div>

            <div class="game-panel" style="width: 320px;">
                <div style="font-size:10px; font-weight:900; color:var(--gold); margin-bottom:12px; letter-spacing:1px;">🛡️ ROUND TABLE CONSENSUS</div>
                <div id="rt-log" style="font-size:13px; color:#fff; line-height:1.7; font-weight:600; font-family:monospace; background:rgba(255,255,255,0.03); padding:12px;">ESTABLISHING UPLINK...</div>
            </div>
        </div>

        <div id="right-stack">
            <div class="game-panel" style="width: 240px; text-align:right;">
                <div style="font-size:10px; color:var(--primary); opacity:0.8;">NET REVENUE</div>
                <div id="rev-all" style="font-size:32px; font-weight:900; color:var(--gold);">+0.0 U</div>
                <div id="daily-debrief" style="margin-top:15px; font-size:12px; color:var(--primary); line-height:1.5; font-style:italic;">ANALYZING BATTLE...</div>
            </div>
        </div>

        <div id="bottom-stack" class="game-panel">
            <div style="font-size:10px; font-weight:900; margin-bottom:12px; color:var(--primary); letter-spacing:1px;">AGENT STATUS</div>
            <div id="agent-list"></div>
        </div>
    </div>

    <div id="news-ticker"><div class="ticker" id="global-ticker">📡 數據對接中... 📡</div></div>

    <div id="modal-overlay" onclick="this.style.display='none'"><div id="modal-box" onclick="event.stopPropagation()">
        <h3 id="m-title">分隊詳情</h3>
        <div id="m-body"></div>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="width:100%; margin-top:20px; padding:15px; border:none; background:var(--bg); color:white; border-radius:12px; font-weight:900; cursor:pointer;">關閉</button>
    </div></div>

    <script>
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0f172a);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 1, 4000);
        camera.position.set(600, 600, 600);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(100, 500, 100); scene.add(dirLight);
        
        const grid = new THREE.GridHelper(2000, 40, 0x1e293b, 0x1e293b); scene.add(grid);

        const buildings = {}; const bObjs = []; const labelData = {};
        function addB(id, name, color, h, x, z) {
            const grp = new THREE.Group(); grp.position.set(x, 0, z);
            const body = new THREE.Mesh(new THREE.BoxGeometry(50, h, 50), new THREE.MeshStandardMaterial({ color, roughness: 0.1, metalness: 0.5 }));
            body.position.y = h/2; grp.add(body);
            const neon = new THREE.Mesh(new THREE.BoxGeometry(52, 2, 52), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x38bdf8, emissiveIntensity: 2 }));
            neon.position.y = h; grp.add(neon);
            scene.add(grp); buildings[id] = grp; body.userData = { id, name }; bObjs.push(body);
            const lbl = document.createElement('div'); lbl.className = 'price-label';
            document.getElementById('label-container').appendChild(lbl);
            labelData[id] = { el: lbl, obj: grp, h: h };
        }

        // 大搬家：完全分散座標，防止重疊
        addB('BTC', 'BTC 指揮總部', 0x1e293b, 150, -250, -250);
        addB('ETH', 'ETH 核心分隊', 0x334155, 120, 250, -250);
        addB('SOL', 'SOL 高頻站台', 0x0f172a, 100, -250, 250);
        addB('XAUT', 'XAUT 黃金部隊', 0xd97706, 110, 500, 0); 
        addB('PEPE', 'PEPE 特攻中心', 0x15803d, 80, 250, 250);
        addB('TREASURY', '中央大金庫', 0x78350f, 95, 0, 0);

        // 新聞與雷達分開擺
        const newsGrp = new THREE.Group(); newsGrp.position.set(0, 0, 500);
        const newsBody = new THREE.Mesh(new THREE.BoxGeometry(70, 180, 70), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
        newsBody.position.y = 90; newsGrp.add(newsBody); scene.add(newsGrp); newsBody.userData = { id: 'NEWS', name: '全城新聞總站' };
        bObjs.push(newsBody); labelData['NEWS'] = { el: document.createElement('div'), obj: newsGrp, h: 180 };
        labelData['NEWS'].el.className = 'price-label'; labelData['NEWS'].el.innerText = '新聞總站'; document.getElementById('label-container').appendChild(labelData['NEWS'].el);

        const rdGrp = new THREE.Group(); rdGrp.position.set(-500, 0, 0);
        const rdBody = new THREE.Mesh(new THREE.CylinderGeometry(8, 25, 200, 4), new THREE.MeshStandardMaterial({ color: 0x475569 }));
        rdBody.position.y = 100; rdGrp.add(rdBody); scene.add(rdGrp); rdBody.userData = { id: 'SPECIAL', name: '雷達特遣隊 (100U)' };
        bObjs.push(rdBody); labelData['SPECIAL'] = { el: document.createElement('div'), obj: rdGrp, h: 200 };
        labelData['SPECIAL'].el.className = 'price-label'; document.getElementById('label-container').appendChild(labelData['SPECIAL'].el);

        // --- [AI 特工小人系統 v6.3] ---
        const agents = [];
        class DigitalAgent {
            constructor(teamId, color, basePos) {
                this.group = new THREE.Group();
                // 頭部
                const head = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
                head.position.y = 12; this.group.add(head);
                // 身體
                const body = new THREE.Mesh(new THREE.BoxGeometry(5, 8, 3), new THREE.MeshStandardMaterial({color}));
                body.position.y = 6; this.group.add(body);
                
                this.group.position.set(basePos.x + (Math.random()-0.5)*80, 0, basePos.z + (Math.random()-0.5)*80);
                scene.add(this.group);
                this.basePos = basePos;
                this.target = new THREE.Vector3().copy(this.group.position);
                this.wait = 0;
            }
            update() {
                if (this.wait > 0) { this.wait--; return; }
                const dist = this.group.position.distanceTo(this.target);
                if (dist < 2) {
                    this.wait = Math.random() * 100 + 50;
                    this.target.set(this.basePos.x + (Math.random()-0.5)*120, 0, this.basePos.z + (Math.random()-0.5)*120);
                } else {
                    const dir = new THREE.Vector3().subVectors(this.target, this.group.position).normalize();
                    this.group.position.addScaledVector(dir, 0.5);
                    this.group.lookAt(this.target.x, 0, this.target.z);
                    this.group.rotation.x = Math.sin(Date.now()*0.01)*0.1; // 走路擺動
                }
            }
        }

        function initAgents() {
            Object.keys(buildings).forEach(id => {
                const count = (id === 'TREASURY') ? 2 : 4;
                const color = buildings[id].children[0].material.color;
                for(let i=0; i<count; i++) agents.push(new DigitalAgent(id, color, buildings[id].position));
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            agents.forEach(a => a.update());

            for(let id in labelData) {
                const vec = new THREE.Vector3().setFromMatrixPosition(labelData[id].obj.matrixWorld);
                vec.y = labelData[id].h + 20; 
                vec.project(camera);
                const x = (vec.x * 0.5 + 0.5) * window.innerWidth; 
                const y = (-(vec.y * 0.5 - 0.5) * window.innerHeight);
                labelData[id].el.style.left = x + 'px'; 
                labelData[id].el.style.top = y + 'px';
                labelData[id].el.style.display = (vec.z < 1 && x > 0 && x < window.innerWidth) ? 'block' : 'none';
            }
            renderer.render(scene, camera);
        }
        
        initAgents();
        animate();

        async function sync() {
            try {
                const r = await fetch('/api/stats'); const d = await r.json();
                document.getElementById('rev-all').innerText = `${d.total_pnl.toFixed(1)} U`;
                document.getElementById('rt-log').innerText = d.round_table_log;
                document.getElementById('daily-debrief').innerText = d.daily_debrief;
                document.getElementById('taiex-status').innerText = `${d.taiex_info.status} ${d.taiex_info.countdown}`;
                document.getElementById('sp500-status').innerText = `${d.sp500_info.status} ${d.sp500_info.countdown}`;
                const aList = document.getElementById('agent-list'); aList.innerHTML = '';
                ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XAUT/USDT', 'PEPE/USDT', 'SPECIAL'].forEach(s => {
                    const h = d.agent_health[s] || { status: 'OFFLINE' };
                    aList.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:11px;"><span>${s}</span><div class="${h.status==='OK'?'light-ok':'light-err'}" style="width:10px; height:10px; border-radius:50%; margin-top:2px;"></div></div>`;
                });
                for(let id in labelData) {
                    if(id === 'NEWS') continue;
                    const p = d.prices[id==='SPECIAL'? 'BTC' : (id==='TREASURY'? 'BTC' : id)];
                    if(p && p != "0.0") labelData[id].el.innerText = `${id}: $${parseFloat(p).toLocaleString()}`;
                }
                window.liveData = d;
            } catch(e) {}
        }
        setInterval(sync, 4000); sync();

        window.addEventListener('click', e => {
            if(e.target.closest('.panel-box')) return;
            const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(bObjs);
            if(hits.length > 0) {
                const ud = hits[0].object.userData;
                const acc = window.liveData?.team_accounts[ud.id + '/USDT'] || window.liveData?.team_accounts[ud.id] || {cash:300, initial:300};
                document.getElementById('m-title').innerText = `🛡️ ${ud.name}`;
                document.getElementById('m-body').innerHTML = `<div style="background:#f1f5f9; padding:20px; border-radius:15px;">
                    <div style="display:flex; justify-content:space-between; font-weight:900;"><span>當前團隊資金</span><span>${acc.cash.toFixed(1)} U</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:#64748b;"><span>預算配置</span><span>${acc.initial} U</span></div>
                    <div style="margin-top:15px; font-size:13px; color:#1e293b; border-top:1px solid #e2e8f0; padding-top:10px;">${window.liveData?.thoughts[ud.id] || '特工正在休整中...'}</div>
                </div>`;
                document.getElementById('modal-overlay').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
